services:

  # ── Kafka broker (KRaft, no ZooKeeper) ──────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── PostgreSQL — OLTP source for CDC ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: sourcedb
      POSTGRES_USER: ${PG_USER:-cdc_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-cdc_pass}
    command:
      - "postgres"
      - "-c" 
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-cdc_user} -d sourcedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kafka Connect + Debezium PostgreSQL connector ────────────────────────────
  connect:
    image: quay.io/debezium/connect:3.0
    container_name: connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      GROUP_ID: 1
      BOOTSTRAP_SERVERS: kafka:9092
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── MinIO — S3-compatible object storage for Iceberg ─────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── One-shot: create the 'warehouse' bucket ──────────────────────────────────
  mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set s3 http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb s3/warehouse --ignore-existing &&
        echo 'Bucket warehouse is ready'
      "

  # ── Iceberg REST catalog ─────────────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: iceberg-rest
    depends_on:
      mc:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_PATH__STYLE__ACCESS=true

  # ── Airflow (webserver + scheduler in one container for simplicity) ──────────
  airflow:
    image: apache/airflow:2.10.5-python3.11
    container_name: airflow
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      connect:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      # Pass connection info so DAGs can reach other services
      - KAFKA_BOOTSTRAP=kafka:9092
      - CONNECT_URL=http://connect:8083
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=sourcedb
      - PG_USER=${PG_USER:-cdc_user}
      - PG_PASSWORD=${PG_PASSWORD:-cdc_pass}
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-data:/opt/airflow
    entrypoint: >
      /bin/bash -c "
        airflow db migrate;
        airflow users create
          --username ${AIRFLOW_USER:-admin}
          --password ${AIRFLOW_PASSWORD:-admin}
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com 2>/dev/null || true;
        exec airflow standalone
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Jupyter + PySpark ────────────────────────────────────────────────────────
  jupyter:
    image: quay.io/jupyter/pyspark-notebook:2025-12-31
    container_name: jupyter
    depends_on:
      - kafka
      - postgres
      - iceberg-rest
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./:/home/jovyan/project
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=sourcedb
      - PG_USER=${PG_USER:-cdc_user}
      - PG_PASSWORD=${PG_PASSWORD:-cdc_pass}
      - KAFKA_BOOTSTRAP=kafka:9092
      - CONNECT_URL=http://connect:8083
      - PYSPARK_SUBMIT_ARGS=--packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.0,org.apache.iceberg:iceberg-spark-runtime-4.1_2.13:1.10.0,org.apache.iceberg:iceberg-aws-bundle:1.10.0 pyspark-shell
    command: >
      start-notebook.py
      --ServerApp.token=${JUPYTER_TOKEN}
      --ServerApp.password=''
      --ServerApp.allow_origin='*'
      --ServerApp.allow_remote_access=True

volumes:
  pg-data:
  minio-data:
  airflow-data: